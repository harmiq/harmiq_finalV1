// Detectar País por IP (con timeout de 3s)
async function detectGeo() {
    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 3000);
        const res = await fetch('https://ipapi.co/json/', { signal: ctrl.signal });
        const data = await res.json();
        if (data.country_code) userCC = data.country_code;
    } catch(e) { console.log("Geo-IP fallback to GLOBAL"); }
}

async function fetchWithTimeout(url, ms = 12000) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    try {
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        return r;
    } catch(e) { clearTimeout(timer); throw e; }
}

function renderFallbackDecade(decade) {
    const tracks = DECADE_FALLBACK[decade] || DECADE_FALLBACK['viernes'];
    const labels = {viernes:"Novedades (referencia)",  "2020s":"2020s","2010s":"2010s","2000s":"2000s","90s":"90s","80s":"80s","70s":"70s","60s":"60s"};
    const row = t => `<div class="track-card">
        <div class="img-container"><span class="track-placeholder">🎵</span></div>
        <div class="track-info">
            <div class="track-title">${t.title}</div>
            <div class="track-artist">${t.artist}</div>
            <span class="year-badge">${t.year}</span>
        </div>
        <div class="actions"><a href="${t.spotify_url}" target="_blank" class="btn-play">Buscar</a></div>
    </div>`;
    return `<div style="margin-bottom:1.5rem">
        <div style="background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.18);border-radius:10px;padding:0.7rem 1rem;margin-bottom:1.2rem;font-size:0.78rem;color:#9CA3AF">
            ⚠️ Datos de referencia — el servidor está iniciando. <a href="https://open.spotify.com/search/${encodeURIComponent(labels[decade]||'hits')}" target="_blank" style="color:var(--green)">Ver en Spotify →</a>
        </div>
        ${tracks.map(row).join('')}
    </div>`;
}

async function loadData(target, isSearch = false) {
    const container = document.getElementById('list-container');
    container.innerHTML = `<div class="loading-box"><div class="spinner"></div><p>Cargando...</p></div>`;

    try {
        if (target === 'top') {
            let data;
            try {
                const response = await fetchWithTimeout(`${BACKEND_URL}/top-charts?cc=${userCC}`, 25000);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                data = await response.json();
            } catch(e) {
                container.innerHTML = `<h2 style="margin-bottom:1.5rem;font-family:'Outfit';text-align:center">Top Charts</h2>` + renderFallbackCharts();
                return;
            }
            
            let html = `<h2 style="margin-bottom:1.5rem; font-family:'Outfit'; text-align:center">Top 50: ${data.country === 'GLOBAL' ? 'Global' : (data.country + ' 🌍')}</h2>`;
            
            const renderList = (tracks, title) => `
                <div style="margin-bottom:2rem">
                    <h3 style="color:var(--p); margin-bottom:1rem; border-left:4px solid var(--p); padding-left:10px">${title}</h3>
                    ${tracks.map((t, i) => `
                        <div class="track-card">
                            <div style="font-weight:900; color:var(--m); width:25px">${t.position || (i+1)}</div>
                            <div class="img-container">
                                <img src="${t.image}" class="track-img" onerror="this.parentElement.innerHTML='🎵'">
                            </div>
                            <div class="track-info">
                                <div class="track-title">${t.title}</div>
                                <div class="track-artist">${t.artist}</div>
                            </div>
                            <div class="actions">
                                <a href="${t.spotify_url}" target="_blank" class="btn-play">Oír</a>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            html += renderList(data.local, `Top 50 ${data.country}`);
            if (data.country !== 'GLOBAL') {
                html += renderList(data.global, "Top 50 Global");
            }
            container.innerHTML = html;
            return;
        }

        const url = isSearch 
            ? `${BACKEND_URL}/search-tracks?q=${encodeURIComponent(target)}&_cb=${Date.now()}`
            : `${BACKEND_URL}/decade-tracks?decade=${target}&_cb=${Date.now()}`;
        
        const response = await fetchWithTimeout(url, 25000);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        if (!data.tracks || data.tracks.length === 0) throw new Error("Vacío");

        const finalTracks = isSearch ? data.tracks : shuffle(data.tracks);

        container.innerHTML = finalTracks.map((t, i) => `
            <div class="track-card" style="animation-delay: ${i * 0.05}s">
                <div class="img-container">
                    ${t.image || t.img 
                        ? `<img src="${t.image || t.img}" class="track-img" alt="Artist" onerror="this.parentElement.innerHTML='<span class=\'track-placeholder\'>🎵</span>'">`
                        : `<span class="track-placeholder">🎵</span>`
                    }
                </div>
                <div class="track-info">
                    <div class="track-title">${t.title || t.name}</div>
                    <div class="track-artist">${t.artist || t.artists}</div>
                    <span class="year-badge">${t.year || ''}</span>
                </div>
                <div class="actions">
                    <a href="${t.spotify_url || '#'}" target="_blank" class="btn-play">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                        Oír
                    </a>
                </div>
            </div>
        `).join('');

    } catch (e) {
        // Mostrar datos de referencia si el backend no responde
        if (!isSearch) {
            container.innerHTML = renderFallbackDecade(target);
        } else {
            container.innerHTML = `
                <div style="text-align:center; padding:3rem; color:var(--m)">
                    <p style="font-size:1.2rem; margin-bottom:.5rem">⚠️ Sin resultados para esta búsqueda</p>
                    <p style="font-size:.8rem; color:#9CA3AF">Prueba con otro artista o canción.</p>
                    <a href="https://open.spotify.com/search/${encodeURIComponent(typeof target === 'string' ? target : '')}" target="_blank" style="display:inline-block;margin-top:1rem;background:var(--green);color:#000;padding:10px 20px;border-radius:10px;font-weight:700;text-decoration:none">Buscar en Spotify →</a>
                </div>`;
        }
    }
}

function changeTab(dec, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-search').style.display = 'none';
    loadData(dec);
}

function doSearch() {
    const q = document.getElementById('search-inp').value.trim();
    if (q.length < 2) return;

    const sTab = document.getElementById('tab-search');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    sTab.style.display = 'block';
    sTab.classList.add('active');
    loadData(q, true);
}

// Inicio automático
window.onload = async () => {
    await detectGeo();
    loadData('viernes');
};
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Éxitos por Década — Hits Reales de Spotify | Harmiq</title>
<meta name="description" content="Explora los mayores éxitos musicales desde los 60 hasta hoy con fotos reales de artistas y conexión a Spotify.">
<link rel="canonical" href="https://harmiq.app/exitos-decada.html">
<link rel="icon" type="image/png" href="/harmiq-logo.png">
<link rel="apple-touch-icon" href="/harmiq-logo.png">
<meta property="og:image" content="https://harmiq.app/harmiq-logo.png">
<meta name="twitter:image" content="https://harmiq.app/harmiq-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#7C4DFF;--a:#FF4FA3;--dark:#0A0818;--card:#130F2A;--t:#E5E7EB;--m:#6B7280;--green:#1DB954}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--t);font-family:'Outfit',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* Navegación Estilo Harmiq */
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(13,13,26,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:100}
.logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#FF4FA3,#7C4DFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-back{background:rgba(124,77,255,.15);color:#A5B4FC;border:1px solid rgba(124,77,255,.3);padding:.45rem 1.1rem;border-radius:20px;font-size:.85rem;font-weight:700;cursor:pointer}

/* Hero */
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:radial-gradient(circle at top right, rgba(124,77,255,0.1), transparent)}
.grad{background:linear-gradient(135deg, var(--p), #FFFFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero h1{font-family:'Outfit';font-size:clamp(2rem,6vw,3rem);font-weight:900}

/* Buscador mejorado */
.search-wrap{max-width:680px;margin:1.5rem auto 0;padding:0 1.5rem}
.search-row{display:flex;gap:.6rem;background:var(--card);border:1px solid rgba(124,77,255,0.3);border-radius:18px;padding:.6rem;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.search-inp{flex:1;background:none;border:none;color:var(--t);padding:0 .8rem;outline:none;font-size:1rem}
.search-btn{background:linear-gradient(135deg,#7C4DFF,#FF4FA3);color:#fff;border:none;padding:.7rem 1.5rem;border-radius:14px;font-weight:800;cursor:pointer;transition:.2s}
.search-btn:hover{transform:scale(1.05)}

/* Tabs de Décadas */
.tabs{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;padding:1.5rem;margin-bottom:1rem}
.tab{padding:.5rem 1.2rem;border-radius:25px;font-size:.85rem;font-weight:700;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,0.05);color:var(--m);cursor:pointer;transition:.3s}
.tab.active{background:linear-gradient(135deg,#7C4DFF,#FF4FA3);color:#fff;border-color:transparent;box-shadow:0 5px 15px rgba(124,77,255,0.4)}

/* Lista de Canciones con FOTOS */
.content{max-width:900px;margin:0 auto;padding:1rem 1.5rem 4rem}
.track-card{display:flex;align-items:center;gap:1.2rem;background:var(--card);border-radius:16px;padding:1rem;margin-bottom:0.8rem;border:1px solid rgba(255,255,255,0.05);transition:.3s;animation:slideIn 0.4s ease forwards}
.track-card:hover{border-color:var(--p);transform:translateX(5px)}

@keyframes slideIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

.img-container{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#000;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.1)}
.track-img{width:100%;height:100%;object-fit:cover}
.track-placeholder{font-size:1.5rem}

.track-info{flex:1;min-width:0}
.track-title{font-weight:800;font-size:1rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:0.85rem;color:var(--m);margin-top:2px}

.actions{display:flex;gap:10px;align-items:center}
.btn-play{background:var(--green);color:#000;padding:.5rem 1rem;border-radius:20px;font-size:0.75rem;font-weight:800;display:flex;align-items:center;gap:5px}
.year-badge{font-size:0.7rem;color:var(--m);background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:5px}

/* Loading */
.loading-box{text-align:center;padding:4rem}
.spinner{width:40px;height:40px;border:4px solid rgba(124,77,255,0.2);border-top-color:var(--p);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:3rem;color:var(--m);font-size:0.8rem;border-top:1px solid rgba(255,255,255,0.05)}

@media (max-width:600px) {
    .actions{flex-direction:column; gap:5px}
    .track-card{gap:0.8rem; padding:0.8rem}
}
</style>
</head>
<body>

<nav class="nav">
    <a class="logo" href="/" style="display:flex;align-items:center;gap:0.8rem;text-decoration:none"><img src="/harmiq-logo.png" id="nav-logo-img" alt="Harmiq IA Logo" style="height:38px; border-radius:10px; box-shadow: 0 0 15px rgba(124,77,255,0.4); transition: filter 0.5s"><span id="nav-logo-text" style="background:linear-gradient(135deg,var(--a),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Harmiq</span></a>
    <button class="nav-back" onclick="location.href='/'">← Volver</button>
</nav>

<div class="hero">
    <h1><span class="grad">Hits de Leyenda</span></h1>
    <p>Fotos reales de artistas y canciones que definieron épocas.</p>
</div>

<div class="search-wrap">
    <div class="search-row">
        <input class="search-inp" id="search-inp" type="text" placeholder="Busca un artista o canción de Spotify..." onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" onclick="doSearch()">Buscar</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="changeTab('viernes', this)">🆕 Novedades</div>
    <div class="tab" onclick="changeTab('2020s', this)">2020s</div>
    <div class="tab" onclick="changeTab('2010s', this)">2010s</div>
    <div class="tab" onclick="changeTab('2000s', this)">2000s</div>
    <div class="tab" onclick="changeTab('90s', this)">90s</div>
    <div class="tab" onclick="changeTab('80s', this)">80s</div>
    <div class="tab" onclick="changeTab('70s', this)">70s</div>
    <div class="tab" onclick="changeTab('60s', this)">60s</div>
    <div class="tab" onclick="changeTab('2026', this)" style="border-color:var(--a); color:var(--a)">2026 🔥</div>
    <div class="tab" id="tab-search" style="display:none">🔍 Búsqueda</div>
</div>

<div class="content">
    <div id="list-container">
        </div>
</div>

<footer>
    <p>© 2026 Harmiq · Datos de Spotify API · Música en Alta Definición</p>
</footer>

<script>
const BACKEND_URL = "https://hamiq-harmiq-backend1.hf.space";

// Mezclar para que no sea estático
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

async function loadData(target, isSearch = false) {
    const container = document.getElementById('list-container');
    container.innerHTML = `<div class="loading-box"><div class="spinner"></div><p>Rescatando fotos de Spotify...</p></div>`;

    try {
        // Diagnostic health check
        const healthCheck = await fetch(`${BACKEND_URL}/health`).then(r => r.json()).catch(() => ({}));
        console.log("Backend Health:", healthCheck);

        const url = isSearch 
            ? `${BACKEND_URL}/search-tracks?q=${encodeURIComponent(target)}`
            : `${BACKEND_URL}/decade-tracks?decade=${target}`;
        
        const response = await fetch(url);
        const data = await response.json();

        if (!data.tracks || data.tracks.length === 0) throw new Error("Vacío");

        const finalTracks = isSearch ? data.tracks : shuffle(data.tracks);

        container.innerHTML = finalTracks.map((t, i) => `
            <div class="track-card" style="animation-delay: ${i * 0.05}s">
                <div class="img-container">
                    ${t.image || t.img 
                        ? `<img src="${t.image || t.img}" class="track-img" alt="Artist" onerror="this.parentElement.innerHTML='<span class=\'track-placeholder\'>🎵</span>'">`
                        : `<span class="track-placeholder">🎵</span>`
                    }
                </div>
                <div class="track-info">
                    <div class="track-title">${t.title || t.name}</div>
                    <div class="track-artist">${t.artist || t.artists}</div>
                    <span class="year-badge">${t.year || ''}</span>
                </div>
                <div class="actions">
                    <a href="${t.spotify_url || '#'}" target="_blank" class="btn-play">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                        Oír
                    </a>
                </div>
            </div>
        `).join('');

    } catch (e) {
        container.innerHTML = `
            <div style="text-align:center; padding:3rem; color:var(--m)">
                <p style="font-size:1.2rem; margin-bottom:.5rem">⚠️ ${e.message === "Vacío" ? "No se encontraron resultados" : "Error de Conexión"}</p>
                <p style="font-size:.8rem; color:#9CA3AF">${e.message === "Vacío" ? "El servidor respondió con una lista vacía. Verifica que tus Secrets estén configurados en Hugging Face Space." : e.message}</p>
                ${e.message === "Vacío" ? `<div style="margin-top:1rem; font-size:0.75rem; background:rgba(255,79,163,0.1); padding:0.5rem; border-radius:10px; color:#FF4FA3">TIP: Si acabas de actualizar los Secrets, reinicia el Space en HF y espera 2 minutos.</div>` : ""}
                <button onclick="location.reload()" style="margin-top:1.5rem; background:var(--p); color:#fff; border:none; padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:700">Reintentar</button>
            </div>`;
    }
}

function changeTab(dec, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-search').style.display = 'none';
    loadData(dec);
}

function doSearch() {
    const q = document.getElementById('search-inp').value.trim();
    if (q.length < 2) return;

    const sTab = document.getElementById('tab-search');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    sTab.style.display = 'block';
    sTab.classList.add('active');
    loadData(q, true);
}

// Inicio automático con Novedades
loadData('viernes');
</script>
</body>
</html>

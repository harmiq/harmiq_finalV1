<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Spotify Intelligence Hub | Harmiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --sp-green: #1DB954; --dark: #0A0818; --card: #130F2A; --p: #7C4DFF; --m: #9CA3AF; --a: #FF4FA3; }
        body { background: var(--dark); color: white; font-family: 'Nunito', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Header & Geo-Tag */
        header { text-align: center; padding: 40px 20px; background: radial-gradient(circle at top, rgba(29, 185, 84, 0.1), transparent); position: relative; }
        .geo-badge { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--sp-green); color: var(--sp-green); padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; display: inline-block; margin-bottom: 15px; }
        .grad{background:linear-gradient(135deg,#1DB954,#FF4FA3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .btn-back-nav{background:rgba(255,255,255,0.05);padding:0.5rem 1rem;border-radius:20px;font-size:0.8rem;border:1px solid rgba(255,255,255,0.1);color:var(--m);cursor:pointer;font-weight:700;position:absolute;left:20px;top:20px}
        
        /* Tabs Premium */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; position: sticky; top: 0; background: rgba(10, 8, 24, 0.9); backdrop-filter: blur(10px); padding: 15px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--m); font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Nunito'; }
        .tab-btn.active { background: var(--sp-green); color: black; border-color: var(--sp-green); box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }
        .tab-btn.friday { border-color: var(--a); color: var(--a); }
        .tab-btn.friday.active { background: var(--a); color: white; }

        /* Buscador */
        .search-container { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; }
        #songQuery { width: 100%; padding: 15px 25px; border-radius: 40px; border: 2px solid rgba(255,255,255,0.1); background: var(--card); color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        #songQuery:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(124, 77, 255, 0.2); }

        /* Grid de Resultados */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .song-card { background: var(--card); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; position: relative; }
        .song-card:hover { transform: translateY(-5px); border-color: var(--p); background: rgba(255,255,255,0.02); }
        .song-card img { width: 80px; height: 80px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        
        .song-info { flex-grow: 1; }
        .song-info h3 { font-family: 'Baloo 2'; margin: 0; font-size: 1.1rem; line-height: 1.2; }
        .song-info p { color: var(--m); font-size: 0.85rem; margin: 5px 0; }
        
        /* Gear Analysis Label */
        .gear-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: rgba(124, 77, 255, 0.1); color: #b794ff; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 5px; }
        
        .btn-play { background: var(--sp-green); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: black; font-size: 0.8rem; flex-shrink: 0; }
        
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .song-card { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

<header>
    <button class="btn-back-nav" onclick="location.href='/'">← Volver al Inicio</button>
    <div id="geo-tag" class="geo-badge">📍 Detectando región...</div>
    <h1 style="font-family: 'Baloo 2'; font-size: 2.5rem; margin: 10px 0;">Hit <span class="grad">Analyzer</span></h1>
    <p style="color:var(--m)">Analizamos el ADN técnico de los éxitos actuales.</p>
</header>

<div class="search-container">
    <input type="text" id="songQuery" placeholder="Busca cualquier canción o artista...">
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="changeMode('local', this)">🏠 Éxitos <span id="country-name">Locales</span></button>
    <button class="tab-btn" onclick="changeMode('global', this)">🌍 Global Top 50</button>
    <button class="tab-btn friday" onclick="changeMode('friday', this)">📅 Estrenos Viernes</button>
</div>

<main id="results" class="results-grid">
    </main>

<script>
    // CONFIGURACIÓN BACKEND
    const BACKEND_URL = "https://tu-api-backend.com/spotify"; // Tu endpoint real
    let userCountryCode = "ES";
    let userCountryName = "España";
    let currentMode = "local";

    // Diccionario de Equipo Inteligente mejorado
    const gearLogic = {
        "urban": "Shure SM7B + Autotune Pro + FL Studio",
        "pop": "Neumann TLM 103 + Apollo Solo + Logic Pro",
        "rock": "AKG C214 + Scarlett + Cubase",
        "dance": "Ableton Live + Serum + Focusrite",
        "indie": "sE Electronics X1 S + Reaper",
        "acoustic": "Audio-Technica AT2020 + GarageBand"
    };

    async function initGeo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            userCountryCode = data.country_code;
            userCountryName = data.country_name;
            document.getElementById('geo-tag').innerText = `📍 ESTÁS EN: ${userCountryName.toUpperCase()}`;
            document.getElementById('country-name').innerText = userCountryName;
            loadData();
        } catch (e) {
            console.log("Error geo, cargando global por defecto");
            loadData();
        }
    }

    async function loadData() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<p style='text-align:center; width:100%; color:var(--m)'>Cargando ADN musical...</p>";

        let endpoint = "";
        switch(currentMode) {
            case 'local': endpoint = `/search?q=top%20tracks%20${userCountryName}`; break;
            case 'global': endpoint = `/search?q=top%20global%2050`; break;
            case 'friday': endpoint = `/search?q=New%20Music%20Friday%20${userCountryCode}`; break;
        }

        try {
            const response = await fetch(`${BACKEND_URL}${endpoint}`);
            const data = await response.json();
            renderTracks(data.tracks.items);
        } catch (err) {
            resultsDiv.innerHTML = "<p style='text-align:center; width:100%'>Error al conectar con tu Backend. Revisa BACKEND_URL.</p>";
        }
    }

    function renderTracks(tracks) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = tracks.map(track => {
            // Lógica predictiva de equipo (basada en popularidad y explicitud para demo)
            let gear = gearLogic.pop;
            if(track.explicit) gear = gearLogic.urban;
            if(track.popularity > 85) gear = gearLogic.pop; // Hits masivos suelen usar Neumann

            return `
                <div class="song-card">
                    <img src="${track.album.images[0].url}" alt="Cover">
                    <div class="song-info">
                        <h3>${track.name}</h3>
                        <p>${track.artists[0].name}</p>
                        <div class="gear-label">🛠️ Setup: ${gear}</div>
                    </div>
                    <a href="${track.external_urls.spotify}" target="_blank" class="btn-play">▶</a>
                </div>
            `;
        }).join('');
    }

    function changeMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadData();
    }

    // Buscador con Debounce
    let timer;
    document.getElementById('songQuery').addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            if(e.target.value.length > 2) {
                currentMode = 'search';
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                searchSpotify(e.target.value);
            }
        }, 600);
    });

    async function searchSpotify(q) {
        const response = await fetch(`${BACKEND_URL}/search?q=${encodeURIComponent(q)}`);
        const data = await response.json();
        renderTracks(data.tracks.items);
    }

    window.onload = initGeo;
</script>
</body>
</html>
